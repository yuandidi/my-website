name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI_JOB_NAME: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: apps/web/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/web/eslint.config.mjs') }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm dlx tsx scripts/timed-phases.ts run install -- pnpm install --frozen-lockfile

      - name: Typecheck, lint and test
        run: pnpm check

      - name: Upload timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timing-quality
          path: .timing/
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI_JOB_NAME: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next/cache
            packages/shared/dist
          key: next-build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**/*.{ts,tsx}', 'packages/shared/src/**/*.ts', 'lib/**/*.ts') }}
          restore-keys: |
            next-build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm dlx tsx scripts/timed-phases.ts run install -- pnpm install --frozen-lockfile

      - name: Build shared and web
        run: pnpm build

      - name: Upload timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timing-build
          path: .timing/
          if-no-files-found: ignore
